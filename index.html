<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRODET | Hygiène Industrielle & Professionnelle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              prodet: {
                900: '#0f172a', // Keep for text contrast
                800: '#1e3a8a', // Corporate Blue (Primary)
                700: '#1d4ed8',
                600: '#2563eb',
                500: '#0ea5e9', // Hygiene Blue (Action)
                400: '#38bdf8', // Lighter Blue
                200: '#bae6fd',
                100: '#f1f5f9', // Light Grey
                50: '#f8fafc',  // Ultra Light Background
              }
            },
            fontFamily: {
              sans: ['Inter', 'Tajawal', 'system-ui', 'sans-serif'],
              display: ['Inter', 'Tajawal', 'sans-serif'],
              arabic: ['Tajawal', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'card': '0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #ffffff;
        color: #0f172a;
        overflow-x: hidden;
      }
      /* Subtle dot pattern for industrial texture */
      .bg-grid-pattern {
         background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
         background-size: 20px 20px;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
